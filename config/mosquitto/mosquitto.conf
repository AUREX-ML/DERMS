# ============================================================
# Mosquitto MQTT Broker — VPP Site Edge Configuration
# ============================================================
# Production-ready config for a Raspberry Pi site-edge broker.
# This broker serves as the local message bus between MyEMS CE,
# the MQTT Bridge Agent, and the Dispatch Agent.
# ============================================================

# ── Persistence ─────────────────────────────────────────────
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 60

# ── Logging ─────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ── Connection limits ────────────────────────────────────────
max_connections 100
message_size_limit 65536
keepalive_interval 60

# ── Listener 1: Local plain-text (MyEMS + local agents) ─────
listener 1883 localhost
protocol mqtt
allow_anonymous false
password_file /etc/mosquitto/passwd

# ── Listener 2: External TLS (remote monitoring / bridges) ──
listener 8883
protocol mqtt
allow_anonymous false
password_file /etc/mosquitto/passwd

# TLS settings — replace cert paths for your deployment
cafile   /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile  /etc/mosquitto/certs/server.key
tls_version tlsv1.3
require_certificate true

# ── ACL file ─────────────────────────────────────────────────
acl_file /etc/mosquitto/acl

# ============================================================
# Inline ACL pattern reference (copy to /etc/mosquitto/acl)
# ============================================================
#
# # MyEMS bridge user — publishes validated telemetry
# user myems_bridge
# topic write vpp/site_A/#
#
# # MQTT Bridge Agent — reads telemetry to forward to ThingsBoard
# user bridge_agent
# topic read  vpp/site_A/+/+/telemetry
#
# # Dispatch Agent — receives commands, publishes responses
# user dispatch_agent
# topic readwrite vpp/site_A/dispatch/#
#
# # Read-only monitor (dashboards, diagnostics)
# user monitor
# topic read vpp/#
#
# ============================================================
